name: Feature request
description: Suggest a new capability for Awesome Slide.
title: "[Feature]: "
labels: ["request"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do that Awesome Slide makes hard or impossible today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like it to work? API sketches, screenshots, or example usage are welcome.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds you've tried or other approaches you've thought about.
  - type: dropdown
    id: scope
    attributes:
      label: Which package would this affect?
      multiple: true
      options:
        - "@awesome-slide/core (runtime, inspector, present mode, CLI)"
        - "@awesome-slide/cli (scaffolder / template)"
        - Agent skills (create-slide, slide-authoring, apply-comments)
        - Docs / marketing site
        - Not sure
    validations:
      required: true
  - type: textarea
    id: extra
    attributes:
      label: Additional context
